<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrum Pro - Community</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    
    <script src="config.js"></script>

    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: #3b82f6; cursor: pointer;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <div class="max-w-md mx-auto p-4 space-y-6">
        <header class="flex justify-between items-center py-4 border-b border-slate-800">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter italic">ELECTRUM <span class="text-blue-500">PRO</span></h1>
                <p id="txt-role-badge" class="text-[10px] font-bold text-slate-400 bg-slate-800 px-2 py-0.5 rounded-full inline-block mt-1">GUEST (PUBLIK)</p>
            </div>
            <div>
                <a href="login.html" id="btn-show-login" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 px-4 rounded-xl transition-all">Login</a>
                <button id="btn-logout" class="hidden bg-red-600 hover:bg-red-500 text-white text-xs font-bold py-2 px-4 rounded-xl transition-all">Logout</button>
            </div>
        </header>

        <div class="flex flex-wrap gap-2 bg-slate-800/50 rounded-2xl p-1.5 border border-slate-700">
            <button onclick="app.switchTab('log')" id="tab-log" class="flex-1 py-2 rounded-xl text-[11px] font-bold bg-blue-600 text-white shadow-lg">Scan Baterai</button>
            <button onclick="app.switchTab('pred')" id="tab-pred" class="flex-1 py-2 rounded-xl text-[11px] font-bold text-slate-400">Prediksi</button>
            
            <button onclick="app.switchTab('admin-bss')" id="tab-admin-bss" class="hidden flex-1 py-2 rounded-xl text-[11px] font-bold text-emerald-400 border border-emerald-900/50">Admin BSS</button>
            <button onclick="app.switchTab('admin-bat')" id="tab-admin-bat" class="hidden flex-1 py-2 rounded-xl text-[11px] font-bold text-purple-400 border border-purple-900/50">Data Baterai</button>
        </div>

        <section id="section-log" class="space-y-4">
            <div class="bg-slate-800/80 rounded-2xl p-4 border border-slate-700 shadow-xl">
                <div id="reader" class="rounded-xl overflow-hidden grayscale contrast-125"></div>
                <div id="qr-display" class="hidden mt-4 p-3 bg-blue-500/10 border border-blue-500/30 rounded-xl text-center">
                    <span class="text-xs text-slate-400 block mb-1">ID BATERAI BARU (PICK)</span>
                    <span id="id-text" class="font-mono text-lg font-bold text-blue-400">---</span>
                </div>
            </div>
            <div class="bg-slate-800/80 rounded-3xl p-6 border border-slate-700 space-y-6">
                <div class="space-y-5">
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <label class="text-xs font-bold text-slate-400 uppercase">🔴 Dilepas (Drop)</label>
                            <span id="val-range-drop" class="text-xl font-black text-red-400">20%</span>
                        </div>
                        <input type="range" id="inp-range-drop" min="1" max="100" value="20" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-red-500">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <label class="text-xs font-bold text-slate-400 uppercase">🟢 Didapat (Pick)</label>
                            <span id="val-range-pick" class="text-xl font-black text-emerald-400">100%</span>
                        </div>
                        <input type="range" id="inp-range-pick" min="1" max="100" value="100" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    </div>
                </div>
                <button id="btn-save-log" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    🚀 KIRIM DATA SWAP
                </button>
            </div>
        </section>

        <section id="section-pred" class="hidden space-y-4">
            <div class="bg-slate-800/80 rounded-3xl p-6 border border-slate-700 space-y-6">
                <h2 class="text-lg font-bold text-white text-center">Kalkulator Perjalanan</h2>
                
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400">Estimasi Jarak Tempuh (Kilometer)</label>
                    <input type="number" id="inp-km" placeholder="Contoh: 25" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white text-2xl font-black focus:ring-2 focus:ring-blue-500 outline-none text-center">
                </div>

                <div class="flex gap-2">
                    <button id="btn-mode-eco" class="flex-1 py-3 rounded-xl text-xs font-bold bg-emerald-600 text-white border border-emerald-500 transition-all">Mode ECO (65km)</button>
                    <button id="btn-mode-normal" class="flex-1 py-3 rounded-xl text-xs font-bold bg-slate-700 text-slate-300 border border-slate-600 transition-all">Mode NORMAL (55km)</button>
                </div>

                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 text-center space-y-2">
                    <p class="text-xs text-slate-400">Kebutuhan Baterai Minimum:</p>
                    <p id="txt-pred-result" class="text-3xl font-black text-blue-400">0%</p>
                </div>
            </div>
        </section>

        <section id="section-admin-bss" class="hidden space-y-4">
            <div class="relative h-80 w-full rounded-2xl overflow-hidden border border-slate-700 shadow-2xl">
                <div id="map-reg" class="h-full w-full"></div>
                <button id="btn-use-gps" class="absolute bottom-4 right-4 z-20 bg-slate-900/90 backdrop-blur-md text-blue-400 text-[10px] font-black px-3 py-2 rounded-xl border border-blue-500/50 shadow-lg hover:bg-slate-800 transition-all active:scale-95 flex items-center gap-1">
                    🎯 TANDAI LOKASI SAYA
                </button>
            </div>
            
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                <h3 class="text-sm font-bold text-emerald-400">Manajemen Stasiun BSS</h3>
                
                <select id="select-bss" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm">
                    <option value="new">➕ BUAT BSS BARU</option>
                </select>

                <input type="text" id="inp-bss-name" placeholder="Nama Stasiun Baru" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white">
                
                <div id="action-create" class="block">
                    <button id="btn-save-bss" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition-all active:scale-95">📍 SIMPAN BSS BARU</button>
                </div>

                <div id="action-edit" class="hidden flex gap-2">
                    <button id="btn-update-bss" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-sm">
                        💾 SIMPAN EDIT
                    </button>
                    <button id="btn-delete-bss" class="flex-none bg-red-600 hover:bg-red-500 text-white font-black py-4 px-5 rounded-2xl shadow-lg transition-all active:scale-95 text-lg" title="Hapus BSS">
                        🗑️
                    </button>
                </div>
            </div>
        </section>

        <section id="section-admin-bat" class="hidden space-y-4">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                <h3 class="text-sm font-bold text-purple-400">Database Baterai</h3>
                <input type="text" id="inp-search-bat" placeholder="Cari ID Baterai..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white">
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs text-slate-400">
                        <thead class="text-xs text-slate-300 uppercase bg-slate-900">
                            <tr>
                                <th class="px-3 py-2 rounded-tl-lg">ID Baterai</th>
                                <th class="px-3 py-2 rounded-tr-lg">Terdaftar</th>
                            </tr>
                        </thead>
                        <tbody id="tbl-batteries" class="divide-y divide-slate-700/50">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
