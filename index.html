<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrum Pro - Surabaya</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .user-marker {
            width: 18px; height: 18px;
            background-color: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px #3b82f6;
            z-index: 10;
        }
        .user-marker::after {
            content: ''; width: 100%; height: 100%;
            position: absolute; background: rgba(59, 130, 246, 0.4);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: #3b82f6; cursor: pointer;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <div class="max-w-md mx-auto p-4 space-y-6">
        <header class="flex justify-between items-center py-4">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter italic">ELECTRUM <span class="text-blue-500">PRO</span></h1>
                <p class="text-[10px] text-slate-500 font-mono">SURABAYA OPS CENTER v2.1 (LITE)</p>
            </div>
            <div class="bg-slate-800 p-2 rounded-lg border border-slate-700">
                <div id="gps-status" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            </div>
        </header>

        <div class="flex bg-slate-800/50 backdrop-blur-md rounded-2xl p-1.5 border border-slate-700">
            <button onclick="app.switchTab('log')" id="tab-log" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-blue-600 text-white shadow-lg">Scan Baterai</button>
            <button onclick="app.switchTab('reg')" id="tab-reg" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all text-slate-400">Peta & Manajemen BSS</button>
        </div>

        <section id="section-log" class="space-y-4">
            <div class="bg-slate-800/80 rounded-2xl p-4 border border-slate-700 shadow-xl">
                <div id="reader" class="rounded-xl overflow-hidden grayscale contrast-125"></div>
                <div id="qr-display" class="hidden mt-4 p-3 bg-blue-500/10 border border-blue-500/30 rounded-xl text-center">
                    <span class="text-xs text-slate-400 block mb-1">ID TERDETEKSI (PICK)</span>
                    <span id="id-text" class="font-mono text-lg font-bold text-blue-400">---</span>
                </div>
            </div>
            <div class="bg-slate-800/80 rounded-3xl p-6 border border-slate-700 space-y-6">
                <div class="space-y-5">
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">🔴 Baterai Dilepas</label>
                            <span id="val-range-drop" class="text-xl font-black text-red-400">20%</span>
                        </div>
                        <input type="range" id="inp-range-drop" min="1" max="100" value="20" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-red-500">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">🟢 Baterai Didapat</label>
                            <span id="val-range-pick" class="text-xl font-black text-emerald-400">100%</span>
                        </div>
                        <input type="range" id="inp-range-pick" min="1" max="100" value="100" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    </div>
                </div>

                <div id="status-bss" class="py-2 px-4 rounded-full bg-slate-900/50 border border-slate-700 text-[11px] text-center text-slate-500">
                    Menunggu GPS...
                </div>

                <button id="btn-save-log" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-900/20 transition-all active:scale-95 flex justify-center items-center gap-2">
                    🚀 UPDATE STATUS BATERAI
                </button>
            </div>
        </section>

        <section id="section-reg" class="hidden space-y-4">
            <div class="relative h-96 w-full rounded-2xl overflow-hidden border border-slate-700 shadow-2xl">
                <div id="map-reg" class="h-full w-full"></div>
                <button id="btn-use-gps" class="absolute bottom-4 right-4 z-20 bg-slate-900/90 backdrop-blur-md text-blue-400 text-[10px] font-black px-3 py-2 rounded-xl border border-blue-500/50 shadow-lg hover:bg-slate-800 transition-all active:scale-95 flex items-center gap-1">
                    🎯 GUNAKAN GPS
                </button>
            </div>
            
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                <select id="select-bss" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none appearance-none font-bold text-sm">
                    <option value="new">➕ BUAT BSS BARU</option>
                </select>

                <input type="text" id="inp-bss-name" placeholder="Nama Stasiun (e.g. BSS Gubeng 01)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                
                <div id="action-create" class="block">
                    <button id="btn-save-bss" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                        📍 DAFTARKAN BSS BARU
                    </button>
                </div>

                <div id="action-edit" class="hidden flex gap-2">
                    <button id="btn-update-bss" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-sm">
                        💾 SIMPAN EDIT
                    </button>
                    <button id="btn-delete-bss" class="flex-none bg-red-600 hover:bg-red-500 text-white font-black py-4 px-5 rounded-2xl shadow-lg transition-all active:scale-95 text-lg" title="Hapus BSS">
                        🗑️
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script>
        class SupabaseService {
            constructor(url, key) { this.client = supabase.createClient(url, key); }
            async saveLog(data) { return await this.client.from('battery_logs').insert([data]); }
            async saveBSS(data) { return await this.client.from('bss_locations').insert([data]); }
            async fetchBSS() {
                const { data } = await this.client.from('bss_locations').select('*').order('nama_bss', { ascending: true });
                return data || [];
            }
            async updateBSS(id, data) { return await this.client.from('bss_locations').update(data).eq('id', id); }
            async deleteBSS(id) { return await this.client.from('bss_locations').delete().eq('id', id); }
        }

        class LocationService {
            constructor() { this.currentPos = { lat: -7.287, lng: 112.74 }; }
            watch(callback) {
                if (!navigator.geolocation) return;
                navigator.geolocation.watchPosition(
                    (pos) => {
                        this.currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        callback(this.currentPos);
                    },
                    (err) => callback(this.currentPos),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
            getDistance(lat1, lon1, lat2, lon2) {
                const R = 6371e3;
                const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
                const dp = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
                const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
        }

        class ElectrumApp {
            constructor() {
                mapboxgl.accessToken = 'pk.eyJ1IjoiYWxmYXRhaHJ6ayIsImEiOiJjbW4zZjk1czgxY2NrMm9xNW1xeDNjNGplIn0.kTnR7XkvTxRPM_Te-rPZnw'; 
                this.db = new SupabaseService('https://zjpnsqixrrjdjpwdtrsu.supabase.co', 'sb_publishable_9UZqhqNpj5-sZcUgiXz-vQ_oyzd2gHZ');
                
                this.loc = new LocationService();
                this.scanner = new Html5Qrcode("reader");
                this.bssList = [];
                this.nearestBss = null;
                this.selectedRegCoords = null;
                this.batteryId = null;
                this.editingBssId = null; 

                this.init();
            }

            async init() {
                this.initMaps(); // Hanya inisialisasi satu map sekarang
                this.initScanner();
                this.loc.watch((p) => this.handleLocationUpdate(p));
                
                this.bssList = await this.db.fetchBSS();
                this.renderBssLayers();
                this.renderBssDropdown(); 
                
                this.initListeners();
                this.switchTab('log'); 
                this.handleLocationUpdate(this.loc.currentPos);
            }

            initMaps() {
                // Semua logic map disatukan di mapReg
                this.mapReg = new mapboxgl.Map({ 
                    container: 'map-reg', 
                    style: 'mapbox://styles/mapbox/navigation-night-v1', 
                    center: [this.loc.currentPos.lng, this.loc.currentPos.lat], 
                    zoom: 15,
                    pitch: 45 // Bikin agak miring biar elegan
                });
                
                // Marker Posisi User sekarang ada di Peta Manajemen
                const el = document.createElement('div'); el.className = 'user-marker';
                this.userMarker = new mapboxgl.Marker(el).setLngLat([this.loc.currentPos.lng, this.loc.currentPos.lat]).addTo(this.mapReg);

                // Marker Pin Merah (Bisa diklik/geser)
                this.regMarker = new mapboxgl.Marker({ color: '#ef4444' }).setLngLat([this.loc.currentPos.lng, this.loc.currentPos.lat]).addTo(this.mapReg);
                
                this.mapReg.on('click', (e) => {
                    this.selectedRegCoords = e.lngLat;
                    this.regMarker.setLngLat(e.lngLat);
                });
            }

            initScanner() {
                const config = { fps: 20, qrbox: { width: 220, height: 220 } };
                this.scanner.start({ facingMode: "environment" }, config, (text) => {
                    this.batteryId = text;
                    document.getElementById('id-text').innerText = text;
                    document.getElementById('qr-display').classList.remove('hidden');
                    if(navigator.vibrate) navigator.vibrate(100);
                }).catch(err => console.error("Kamera Error:", err));
            }

            handleLocationUpdate(pos) {
                const gpsDot = document.getElementById('gps-status');
                if (gpsDot) gpsDot.classList.replace('bg-red-500', 'bg-emerald-500');

                if (this.userMarker) this.userMarker.setLngLat([pos.lng, pos.lat]);

                // Hitung jarak murni di latar belakang (tanpa geser peta log lagi)
                this.nearestBss = null;
                if (this.bssList && this.bssList.length > 0) {
                    this.bssList.forEach(bss => {
                        const d = this.loc.getDistance(pos.lat, pos.lng, bss.lat, bss.long);
                        if (d <= 50) this.nearestBss = bss;
                    });
                }

                const statusEl = document.getElementById('status-bss');
                if (statusEl) {
                    if (this.nearestBss) {
                        statusEl.innerText = `📍 BSS TERKUNCI: ${this.nearestBss.nama_bss}`;
                        statusEl.className = "py-3 px-4 rounded-xl bg-emerald-900/50 border border-emerald-500 text-sm font-bold text-center text-emerald-400";
                    } else {
                        statusEl.innerText = "⚠️ DI LUAR RADIUS BSS (SURABAYA)";
                        statusEl.className = "py-3 px-4 rounded-xl bg-slate-900/50 border border-slate-700 text-sm font-bold text-center text-slate-400";
                    }
                }
            }

            renderBssLayers() {
                // Gambar stasiun dan radius 50m di Peta Manajemen
                this.mapReg.on('load', () => {
                    this.bssList.forEach((bss, i) => {
                        new mapboxgl.Marker({ color: '#10b981', scale: 0.6 })
                            .setLngLat([bss.long, bss.lat])
                            .setPopup(new mapboxgl.Popup().setHTML(`<b class="text-slate-900">${bss.nama_bss}</b>`))
                            .addTo(this.mapReg);

                        const sourceId = `radius-src-${i}`;
                        this.mapReg.addSource(sourceId, {
                            type: 'geojson',
                            data: this.createGeoJSONCircle([bss.long, bss.lat], 50)
                        });

                        this.mapReg.addLayer({
                            id: `radius-layer-${i}`,
                            type: 'fill',
                            source: sourceId,
                            paint: { 'fill-color': '#10b981', 'fill-opacity': 0.15, 'fill-outline-color': '#10b981' }
                        });
                    });
                });
            }

            createGeoJSONCircle(center, radiusInMeters, points = 64) {
                const coords = { latitude: center[1], longitude: center[0] };
                const km = radiusInMeters / 1000;
                const ret = [];
                const distanceX = km / (111.32 * Math.cos(coords.latitude * Math.PI / 180));
                const distanceY = km / 110.57;

                for (let i = 0; i < points; i++) {
                    const theta = (i / points) * (2 * Math.PI);
                    const x = distanceX * Math.cos(theta);
                    const y = distanceY * Math.sin(theta);
                    ret.push([coords.longitude + x, coords.latitude + y]);
                }
                ret.push(ret[0]);
                return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [ret] } };
            }

            switchTab(tab) {
                document.getElementById('section-log').classList.add('hidden');
                document.getElementById('section-reg').classList.add('hidden');
                
                document.getElementById('tab-log').className = "flex-1 py-3 rounded-xl text-slate-400 text-xs transition-all";
                document.getElementById('tab-reg').className = "flex-1 py-3 rounded-xl text-slate-400 text-xs transition-all";

                if (tab === 'log') {
                    document.getElementById('section-log').classList.remove('hidden');
                    document.getElementById('tab-log').className = "flex-1 py-3 rounded-xl bg-blue-600 text-white shadow-lg text-xs font-bold";
                } else if (tab === 'reg') {
                    document.getElementById('section-reg').classList.remove('hidden');
                    document.getElementById('tab-reg').className = "flex-1 py-3 rounded-xl bg-emerald-600 text-white shadow-lg text-xs font-bold";
                    // Resize peta hanya saat tab manajemen dibuka agar ukurannya pas
                    setTimeout(() => { this.mapReg.resize(); }, 300);
                }
            }

            renderBssDropdown() {
                const select = document.getElementById('select-bss');
                select.innerHTML = '<option value="new">➕ BUAT BSS BARU</option>';
                this.bssList.forEach(bss => {
                    const opt = document.createElement('option');
                    opt.value = bss.id; opt.textContent = `📝 EDIT: ${bss.nama_bss.toUpperCase()}`;
                    select.appendChild(opt);
                });
            }

            initListeners() {
                // Slider Baru (Drop & Pick)
                document.getElementById('inp-range-drop').addEventListener('input', (e) => {
                    document.getElementById('val-range-drop').innerText = e.target.value + "%";
                });
                document.getElementById('inp-range-pick').addEventListener('input', (e) => {
                    document.getElementById('val-range-pick').innerText = e.target.value + "%";
                });

                const btnGps = document.getElementById('btn-use-gps');
                if (btnGps) {
                    btnGps.addEventListener('click', () => {
                        const pos = this.loc.currentPos;
                        if (pos && pos.lat) {
                            this.selectedRegCoords = { lng: pos.lng, lat: pos.lat };
                            this.regMarker.setLngLat([pos.lng, pos.lat]);
                            this.mapReg.flyTo({ center: [pos.lng, pos.lat], zoom: 18, essential: true });
                            if(navigator.vibrate) navigator.vibrate(50);
                        } else {
                            alert("Sabar boss, GPS masih mencari lokasi...");
                        }
                    });
                }

                document.getElementById('select-bss').addEventListener('change', (e) => {
                    const val = e.target.value;
                    const inputName = document.getElementById('inp-bss-name');
                    const actionCreate = document.getElementById('action-create');
                    const actionEdit = document.getElementById('action-edit');

                    if (val === 'new') {
                        this.editingBssId = null; inputName.value = '';
                        actionCreate.classList.replace('hidden', 'block'); actionEdit.classList.replace('flex', 'hidden');
                    } else {
                        this.editingBssId = val; const bss = this.bssList.find(b => b.id == val);
                        if (bss) {
                            inputName.value = bss.nama_bss;
                            actionCreate.classList.replace('block', 'hidden'); actionEdit.classList.replace('hidden', 'flex');
                            this.selectedRegCoords = { lng: bss.long, lat: bss.lat };
                            this.regMarker.setLngLat([bss.long, bss.lat]);
                            this.mapReg.flyTo({ center: [bss.long, bss.lat], zoom: 17, essential: true });
                        }
                    }
                });

                document.getElementById('btn-save-log').addEventListener('click', async () => {
                    if (!this.batteryId) return alert("Scan QR Baterai rek!");
                    const { error } = await this.db.saveLog({
                        id_baterai: this.batteryId, lat: this.loc.currentPos.lat, long: this.loc.currentPos.lng,
                        // Kirim dua data slider sekaligus
                        persentase_drop: parseInt(document.getElementById('inp-range-drop').value),
                        persentase_pick: parseInt(document.getElementById('inp-range-pick').value),
                        id_bss: this.nearestBss ? this.nearestBss.id : null
                    });
                    if (error) alert("Gagal Simpan: " + error.message); else { alert("✅ Data Tersimpan!"); location.reload(); }
                });

                document.getElementById('btn-save-bss').addEventListener('click', async () => {
                    const name = document.getElementById('inp-bss-name').value;
                    const coords = this.selectedRegCoords || this.loc.currentPos;
                    if (!name) return alert("Isi jenenge stasiun disik!");
                    const { error } = await this.db.saveBSS({ nama_bss: name, lat: coords.lat, long: coords.lng });
                    if (error) alert("Error: " + error.message); else { alert("✅ BSS Baru Terdaftar!"); location.reload(); }
                });

                document.getElementById('btn-update-bss').addEventListener('click', async () => {
                    const name = document.getElementById('inp-bss-name').value;
                    const coords = this.selectedRegCoords; 
                    if (!name || !this.editingBssId) return;
                    const { error } = await this.db.updateBSS(this.editingBssId, { nama_bss: name, lat: coords.lat, long: coords.lng });
                    if (error) alert("Gagal Update: " + error.message); else { alert("✅ BSS Berhasil Diupdate!"); location.reload(); }
                });

                document.getElementById('btn-delete-bss').addEventListener('click', async () => {
                    if (!this.editingBssId) return;
                    if (confirm("⚠️ Yakin mau menghapus stasiun BSS ini?")) {
                        const { error } = await this.db.deleteBSS(this.editingBssId);
                        if (error) alert("Gagal Hapus: " + error.message); else { alert("🗑️ BSS Berhasil Dihapus!"); location.reload(); }
                    }
                });
            }
        }

        const app = new ElectrumApp();
    </script>
</body>
</html>
